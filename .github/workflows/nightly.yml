# Nightly ingest -> build -> deploy (DATA-03).
#
# The scheduled cron fires the incremental nightly ingest; a human triggers workflow_dispatch
# with full_backfill=true once to seed the national dataset. Every data-correctness property
# (idempotent upsert, high-water resume/self-heal, touched-only re-derive, byte-stable output)
# already lives in pipeline/src — this workflow is pure orchestration.
#
# INVARIANTS (gated by pipeline/test/workflow.test.ts):
#   - off-peak cron "37 4 * * *" (NOT 00:00), workflow_dispatch full_backfill boolean input
#   - concurrency cancel-in-progress:false so two runs never push to `data` at once
#   - least-privilege permissions (contents:write for the data push, pages+id-token for deploy)
#   - `npm test && npm run typecheck` GATE runs BEFORE any data-branch push or deploy
#   - pipeline runs with `--root ./data-wt` so writes land in the data-branch worktree, never main
#   - skip-empty commit: no new data -> no commit (git status --porcelain gate)
#   - nightly push is a plain fast-forward `git push origin data`; ZERO force-pushes in this
#     file; no step ever writes/pushes to main
#   - heartbeat pings only on success, guarded on a non-empty secret, ends with `|| true`
#   - deploy uses actions/deploy-pages@v4; all actions pinned to major tags (supply-chain)
name: nightly

on:
  schedule:
    - cron: "37 4 * * *" # off-peak minute; NOT :00 and NOT 00:00 UTC (cron-drop mitigation)
  workflow_dispatch:
    inputs:
      full_backfill:
        description: "Run the full national backfill (all stations from scratch)"
        type: boolean
        default: false

concurrency:
  group: betravedur-data-branch
  cancel-in-progress: false # let a running ingest finish; queue the next (no mid-push kill)

permissions:
  contents: write # push the data delta to the `data` branch (never main)
  pages: write # deploy to GitHub Pages
  id-token: write # Pages OIDC

jobs:
  ingest-build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout main (code, read-only)
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # GATE: the full suite + typecheck must pass before any data push or deploy. If this
      # fails the run stops here, so a broken build never ships and never touches `data`.
      - name: Test + typecheck gate
        run: npm test && npm run typecheck

      # Materialize the `data` branch as ./data-wt so the pipeline's relative `data` root (via
      # --root ./data-wt) resolves INSIDE the worktree, not the coincidentally-named ./data on main.
      - name: Materialize data branch worktree
        run: |
          git fetch origin data --depth=1
          git worktree add ./data-wt data

      # Incremental resume (high-water+1 self-heals any missed nights) for the seed stations, OR
      # the full national enumeration when dispatched with full_backfill=true. Both write to the
      # worktree via --root ./data-wt (RESEARCH Pitfall 1 fix).
      - name: Backfill + aggregate
        run: |
          set -euo pipefail
          if [ "${{ inputs.full_backfill }}" = "true" ]; then
            # full national sweep (dispatch-only): enumerate the national station set via the
            # stations-list CLI (npx tsx — NOT bare `node <file>.ts`; type-stripping is fragile
            # on the pinned Node 22). The CLI emits `<aws|synop>:<id>:<start>` per line so each
            # FRESH station is swept from its real start year — WITHOUT the `:start`, a fresh
            # station (no on-disk high-water) defaults to the current year only (backfill.ts),
            # which is why the first national run left stations.json at 2 markers.
            specs=$(npx tsx pipeline/src/stations-list.ts)
            # Resilient per-station backfill: one station's hard error (e.g. a 503 throttle
            # propagates as an error, never []) must NOT abort the whole national sweep — the
            # high-water resume self-heals a failed station on the next run. Collect failures and
            # continue; the aggregate then runs over the FULL enumerated set (empty/failed shells
            # fail the >=3-qualifying-years gate harmlessly). `if !` keeps errexit from firing.
            failed=""
            for spec in $specs; do
              kind=${spec%%:*}          # aws | synop
              rest=${spec#*:}           # id:start
              id=${rest%%:*}            # station id
              start=${rest##*:}         # start year
              if ! npm run backfill -- --root ./data-wt "$kind" "$id" "$start"; then
                echo "::warning::backfill failed for ${kind}:${id} (start ${start}) — continuing sweep; high-water resume self-heals next run"
                failed="${failed} ${kind}:${id}"
              fi
            done
            # Derive the plain `<kind>:<id>` aggregate spec list (strip the trailing `:start`).
            aggspecs=$(printf '%s\n' $specs | sed 's/:[0-9]\{1,\}$//')
            # touched-only aggregate over the full enumerated spec list in one call.
            npm run aggregate -- --root ./data-wt $aggspecs
            if [ -n "$failed" ]; then
              echo "::warning::national sweep completed with failed stations:${failed}"
            fi
          else
            # nightly incremental: resume each known seed station from high-water+1.
            npm run backfill -- --root ./data-wt synop 1
            npm run backfill -- --root ./data-wt aws 1350
            npm run aggregate -- --root ./data-wt synop:1 aws:1350
          fi

      # Skip-empty: touched-only aggregate + byte-stable serialization means an unchanged station
      # produces no diff. A night with no new observations produces no commit.
      - name: Commit data delta (skip if empty)
        id: commit
        working-directory: ./data-wt
        run: |
          git config user.name  "betravedur-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "data: nightly $(date +%F)"
            git push origin data
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "no data change — skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Stage the ship-set (derived/ + stations.json + manifest.json) into the build input.
      # copyShipSet only walks SHIP_OUTPUTS, so raw/ can never leak into the build.
      - name: Stage ship-set into site build
        run: npx tsx -e "import('./pipeline/src/ship.ts').then(m => m.copyShipSet('./data-wt', 'site/public/data'))"

      - name: Build site
        run: npm --prefix site run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      # Heartbeat: pings only on success, only when the secret is set, and can never fail the run.
      - name: Heartbeat (opt-in, never fails the run)
        if: ${{ success() }}
        env:
          HEARTBEAT_URL: ${{ secrets.HEARTBEAT_URL }}
        run: '[ -n "$HEARTBEAT_URL" ] && curl -fsS -m 10 "$HEARTBEAT_URL" || true'

      # Always tear down the data-branch worktree (WR-02): never leave ./data-wt behind in the
      # main checkout (it is gitignored, but an explicit removal keeps the tree clean). Uses a
      # plain (non-forced) remove to preserve the file-wide zero-force-push invariant — the
      # nightly commits/pushes its delta, so the worktree is clean by here; `|| true` means an
      # aborted mid-run (uncommitted worktree) can never fail the job, it just skips cleanup.
      - name: Remove data worktree
        if: always()
        run: git worktree remove ./data-wt || true

  deploy:
    needs: ingest-build
    runs-on: ubuntu-latest
    # Gate the pure-cron deploy on a real data change; always deploy on a manual dispatch.
    if: ${{ needs.ingest-build.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' }}
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

